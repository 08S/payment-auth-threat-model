name: Security Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: TypeScript Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  codeql:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tuned Semgrep rules
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/src"
          semgrep/semgrep:latest
          semgrep scan
          --config p/owasp-top-ten
          --config p/javascript
          --config p/typescript
          --config p/nodejs
          --error
          --metrics=off
          --severity ERROR
          --severity WARNING
          --exclude node_modules
          --exclude dist
          --exclude docs/payment-auth.postman_collection.json
          /src

  secrets:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  sca:
    name: SCA - npm Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gate on high and critical npm advisories
        run: npm audit --audit-level=high --omit=dev

  dependency-review:
    name: SCA - Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          allow-licenses: MIT, ISC, Apache-2.0, BSD-2-Clause, BSD-3-Clause, 0BSD
          fail-on-scopes: runtime

  trivy-fs:
    name: SCA and Config Scan - Trivy Filesystem
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml

  container:
    name: Container Image Scan - Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local image
        run: docker build --pull -t payment-auth-threat-model:${{ github.sha }} .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: payment-auth-threat-model:${{ github.sha }}
          trivy-config: trivy.yaml

  dast:
    name: DAST - ZAP Baseline
    runs-on: ubuntu-latest
    needs:
      - quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start service
        env:
          NODE_ENV: development
          PORT: 3000
          ISSUER: http://127.0.0.1:3000
          DEMO_REDIRECT_URI: http://127.0.0.1:5173/callback
          SESSION_SECRET: ci-only-random-looking-session-secret-64-characters-minimum-value
        run: |
          npm start &
          echo $! > app.pid
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health; then
              exit 0
            fi
            sleep 1
          done
          cat app.pid | xargs -r kill
          exit 1

      - name: Run ZAP baseline scan
        run: >
          docker run --rm --network host
          -v "${{ github.workspace }}:/zap/wrk/:rw"
          ghcr.io/zaproxy/zaproxy:stable
          zap-baseline.py
          -t http://127.0.0.1:3000
          -c .zap/rules.tsv
          -r zap-report.html
          -J zap-report.json
          -a
          -j
          -I

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            zap-report.html
            zap-report.json
          if-no-files-found: ignore

      - name: Stop service
        if: always()
        run: cat app.pid | xargs -r kill || true
